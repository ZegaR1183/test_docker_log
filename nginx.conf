server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_format html;  # Используем HTML вместо JSON
    }

    # Установка правильного Content-Type для Excel-файлов
    location ~ \.xlsx$ {
        add_header Content-Type application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;
        add_header Cache-Control "no-cache";
        expires off;
    }

    # Защита от выполнения PHP (на всякий случай)
    location ~ \.php$ {
        deny all;
    }

    # Логи (выводятся в stdout/stderr, видны через docker logs)
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
